<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0;url=/cgi-bin/badstore.cgi" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GodStore — Redirecting…</title>
  <style>
    :root {
      --bg:     #0f172a;
      --accent: #38bdf8;
      --text:   #e2e8f0;
      --muted:  #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fade-in 0.4s ease;
    }
    @keyframes fade-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 2.2em;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
    }
    .logo span { color: var(--accent); }
    .tagline { color: var(--muted); font-size: 0.95em; }
    .loader {
      width: 40px;
      height: 3px;
      background: #1e293b;
      border-radius: 9999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loader::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: var(--accent);
      border-radius: 9999px;
      animation: slide 0.9s ease-in-out infinite alternate;
    }
    @keyframes slide { from { margin-left:0 } to { margin-left:60% } }
    a { color: var(--accent); text-decoration: none; font-size: 0.85em; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" width="40" height="40">
        <path d="M12 2L3 7v5c0 5.25 3.9 10.15 9 11.35C17.1 22.15 21 17.25 21 12V7l-9-5z"
              fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 12l2.2 2.2L15.4 9.8" stroke="#38bdf8" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      God<span>Store</span>
    </div>
    <p class="tagline">Security-first commerce. Loading your experience…</p>
    <div class="loader"></div>
    <a href="/cgi-bin/badstore.cgi">Click here if not redirected automatically</a>
  </div>
</body>
</html>
